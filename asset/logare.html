<!DOCTYPE html>
<html lang="en">

<head>
  <title>Logare</title>

  <style>

    :root {
      --theme-color: white;
    }

    body {

      background-color: #f37210;

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      margin: 0;
    }

    form {

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 10px;

      background-color: var(--theme-color);

      padding: 20px;

      border-radius: 10px;

      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input,
    button {

      padding: 10px;

      font-size: 16px;

      width: 250px;
    }

    button {

      cursor: pointer;
    }

  </style>
</head>

<body>

  <form>

    <h1>Logare</h1>

    <input
      type="text"
      placeholder="Nume și prenume"
      pattern="[A-Za-zĂÂÎȘȚăâîșț ]{5,}"
      required
    >

    <input
      type="password"
      placeholder="Parola"
      pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
      title="Minim 8 caractere, o literă mare și un simbol special"
      required
    >

    <input
      type="date"
      min="1000-01-01"
      max="2026-05-31"
      required
    >

    <label>Culoare Temă</label>

    <input
      type="color"
      id="ThemeColor"
    >

    <button type="submit">
      Logare
    </button>

  </form>

  <script>

    const colorpicker =
      document.getElementById("ThemeColor");

    colorpicker.addEventListener("input", function () {

      document.documentElement.style.setProperty(
        "--theme-color",
        colorpicker.value
      );

    });

  </script>

</body>

</html>
