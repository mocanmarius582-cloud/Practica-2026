<!DOCTYPE html>
<html lang="en">

<head>
  <title>Logare</title>

  <style>

    :root {
      --theme-color: white;
    }

    body {
      background-color: #f37210;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;

      align-items: center;
      justify-content: center;

      height: 100vh;
      margin: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;

      background-color: var(--theme-color);

      padding: 20px;
      border-radius: 10px;

      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
    }

  </style>
</head>

<body>

  <h1>Logare</h1>

  <form>

    <h3>Introduceti Numele vostru</h3>

    <input
      type="text"
      pattern="[a-z0-9 ]{5,}"
      placeholder="Nume și prenume"
      required
    >

    <h3>Introduceti Parola</h3>

    <input
      type="password"
      pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
      title="Minim 8 caractere, o literă mare și un simbol special"
      placeholder="Parola"
      required
    >

    <h3>Alegeți data</h3>

    <input
      type="date"
      min="1000-01-01"
      max="2026-05-31"
      required
    >

    <h3>Culoare Temă</h3>

    <input
      type="color"
      id="ThemeColor"
    >

    <button type="submit">
      Logare
    </button>

  </form>

  <script>

    const colorpicker = document.getElementById("ThemeColor");

    colorpicker.addEventListener("input", function () {

      document.documentElement.style.setProperty(
        "--theme-color",
        colorpicker.value
      );

    });

  </script>

</body>

</html>
