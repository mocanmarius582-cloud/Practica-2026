<!DOCTYPE html>
<html lang="ro">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    404 | Pagina nu a fost găsită
  </title>

  <meta
    name="robots"
    content="noindex">

  <link
    rel="stylesheet"
    href="css/style.css">

  <style>

    body {

      margin: 0;

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      background:
        linear-gradient(
          135deg,
          #fb8c3e,
          #ffb36b
        );

      font-family: Arial, sans-serif;

      overflow: hidden;
    }

    .error-container {

      width: min(700px, 90%);

      padding: 50px 30px;

      text-align: center;

      background:
        rgba(255,255,255,0.95);

      border-radius: 24px;

      box-shadow:
        0 15px 35px rgba(0,0,0,0.15);
    }

    .error-code {

      margin: 0;

      font-size: 7rem;

      color: #f08a3e;
    }

    .error-title {

      margin-top: 10px;

      font-size: 2rem;

      color: #222;
    }

    .error-text {

      margin:
        20px 0 35px;

      line-height: 1.6;

      color: #555;
    }

    .home-btn {

      display: inline-block;

      padding: 14px 28px;

      background: #f08a3e;

      color: white;

      text-decoration: none;

      border-radius: 12px;

      font-size: 1rem;

      transition: 0.3s;
    }

    .home-btn:hover {

      background: #d96d1d;

      transform: translateY(-3px);
    }

    @media (max-width: 600px) {

      .error-code {

        font-size: 5rem;
      }

      .error-title {

        font-size: 1.5rem;
      }
    }

  </style>

</head>

<body>

  <main class="error-container">

    <h1 class="error-code">
      404
    </h1>

    <h2 class="error-title">
      Pagina nu a fost găsită
    </h2>

    <p class="error-text">

      Ne pare rău, pagina pe care încercați să o accesați
      nu există sau a fost mutată.

    </p>

    <a
      href="Sait Practica.html"
      class="home-btn">

      Înapoi la pagina principală

    </a>

  </main>

</body>

</html>
